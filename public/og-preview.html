<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #050816;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Glow blobs */
    .blob1 {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(100,60,220,0.25) 0%, transparent 70%);
      top: -100px;
      left: -80px;
      filter: blur(40px);
    }
    .blob2 {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(60,160,220,0.2) 0%, transparent 70%);
      bottom: -80px;
      right: 100px;
      filter: blur(40px);
    }

    .card {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 64px;
      padding: 60px 80px;
    }

    /* Photo circle */
    .photo {
      flex-shrink: 0;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.15);
      object-fit: cover;
      background: #1a1a2e;
      box-shadow: 0 0 0 6px rgba(100,60,220,0.2);
    }

    .text { flex: 1; }

    .tag {
      display: inline-block;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 18px;
    }

    h1 {
      font-size: 56px;
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 30%, rgba(180,140,255,0.9) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }

    .role {
      font-size: 22px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      margin-bottom: 32px;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .pill {
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.65);
    }

    .url {
      position: absolute;
      bottom: 32px;
      right: 48px;
      font-size: 13px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.05em;
      z-index: 10;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="blob1"></div>
  <div class="blob2"></div>

  <div class="card">
    <img class="photo" src="asad.png" alt="Asad Gohar" />
    <div class="text">
      <span class="tag">Portfolio</span>
      <h1>Asad Gohar</h1>
      <p class="role">Software Engineer</p>
      <div class="pills">
        <span class="pill">Full-Stack</span>
        <span class="pill">Cloud</span>
        <span class="pill">AI / ML</span>
        <span class="pill">React</span>
        <span class="pill">TypeScript</span>
      </div>
    </div>
  </div>

  <span class="url">asadgohar-portfolio.vercel.app</span>
</body>
</html>
